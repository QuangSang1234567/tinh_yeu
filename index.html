      const letters = ["A", "B", "C", "D", "E"];

      function render() {
        const quiz = document.getElementById("quiz");

        questions.forEach((q, i) => {
          let html = `<div class="question" data-correct="${q.correct}">
      <p><b>Câu ${i + 1}:</b> ${q.q}</p>`;

          q.answers.forEach((a, index) => {
            html += `<div class="answer" data-letter="${letters[index]}">
        ${letters[index]}. ${a}
      </div>`;
          });

          html += "</div>";
          quiz.innerHTML += html;
        });

        document.querySelectorAll(".answer").forEach((a) => {
          a.onclick = function () {
            let p = this.parentElement;
            let correct = p.dataset.correct;

            // reset màu
            p.querySelectorAll(".answer").forEach((x) => {
              x.classList.remove("selected", "correct");
            });

            let letter = this.dataset.letter;

            // chọn đáp án
            this.classList.add("selected");

            // 👉 FIX: xử lý nhiều đáp án
            let correctArr = correct.includes(",")
              ? correct.split(",")
              : [correct];

            if (correctArr.includes(letter)) {
              this.classList.add("correct"); // xanh
            } else {
              this.classList.add("selected"); // đỏ
            }
          };
        });
      }

      function submitQuiz() {
        let score = 0;

        document.querySelectorAll(".question").forEach((q) => {
          let correct = q.dataset.correct;

          let correctArr = correct.includes(",")
            ? correct.split(",")
            : [correct];

          let selected = q.querySelector(".selected");

          if (selected) {
            let letter = selected.dataset.letter;
            if (correctArr.includes(letter)) {
              score++;
            }
          }
        });

        document.getElementById("result").innerText =
          "Điểm: " + score + "/" + questions.length;
      }

      render();
